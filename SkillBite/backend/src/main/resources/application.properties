spring.datasource.url=jdbc:h2:mem:skillbitedb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8050

skillbite.jwt.secret=skillbite-vinland-secret-key-must-be-at-least-256-bits-long-for-hs256
skillbite.jwt.expiration=86400000

# Judge settings
judge.default-time-limit-seconds=2
judge.default-memory-limit-mb=256
