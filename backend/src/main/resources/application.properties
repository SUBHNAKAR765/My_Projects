spring.datasource.url=jdbc:h2:file:./skillbitedb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.open-in-view=false

server.port=${PORT:8050}

skillbite.jwt.secret=skillbite-vinland-secret-key-must-be-at-least-256-bits-long-for-hs256
skillbite.jwt.expiration=86400000

judge.default-time-limit-seconds=2
judge.default-memory-limit-mb=256
